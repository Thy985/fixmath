name: formula_fix
description: "FormulaFix - 移动端 Typora 类 Markdown 写作工具，以公式 / 图表 / 学术写作为特色。"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.9

  # 路由
  go_router: ^12.1.1

  # 本地存储 / 文件
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  file_picker: 6.1.1

  # 分享
  share_plus: ^7.2.1

  # 公式 / 图表渲染
  flutter_math_fork: ^0.7.2
  flutter_svg: ^2.0.9
  flutter_inappwebview: ^6.0.0
  flutter_inappwebview_platform_interface: ^1.0.0

  # 导出
  pdf: 3.10.7
  archive: ^3.4.9
  xml: 6.4.2
  vector_math: ^2.1.4

  # 工具
  crypto: ^3.0.3
  uuid: ^4.3.3
  intl: ^0.18.1

dependency_overrides:
  # P0 修复: flutter_inappwebview_android 1.1.3 使用已废弃的
  # getDefaultProguardFile('proguard-android.txt')，在 AGP 8.x 中不再支持。
  # Git master 已修复为 proguard-android-optimize.txt，但未发布到 pub.dev 稳定版。
  # 三个包必须全部 override 为 git master，否则 platform_interface 版本不兼容。
  # 待 1.1.4+ 发布后移除此 override 并升级 flutter_inappwebview。
  flutter_inappwebview:
    git:
      url: https://github.com/pichillilorenzo/flutter_inappwebview.git
      path: flutter_inappwebview
      ref: master
  flutter_inappwebview_android:
    git:
      url: https://github.com/pichillilorenzo/flutter_inappwebview.git
      path: flutter_inappwebview_android
      ref: master
  flutter_inappwebview_platform_interface:
    git:
      url: https://github.com/pichillilorenzo/flutter_inappwebview.git
      path: flutter_inappwebview_platform_interface
      ref: master

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # TODO: 补齐 assets 目录后启用
  # assets:
  #   - assets/fonts/
  #   - assets/templates/
