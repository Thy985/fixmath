name: formula_fix
description: "纯本地 Markdown/LaTeX 编辑器，支持公式渲染与多格式导出"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_markdown: ^0.7.4+3
  flutter_math_fork: ^0.7.2

  pdf: ^3.11.1
  printing: ^5.13.3

  flutter_inappwebview: ^6.1.5

  path_provider: ^2.1.5
  file_picker: ^8.1.6
  share_plus: ^10.1.4

  archive: ^3.6.1

  flutter_riverpod: ^2.6.1

  shared_preferences: ^2.3.4

  go_router: ^14.6.2

  uuid: ^4.5.1
  intl: ^0.19.0

  flutter_svg: ^2.0.10+1
  crypto: ^3.0.3
  vector_graphics: ^1.1.9+1
  xml: ^6.5.0
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/js/
    - assets/mermaid_renderer.html

  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
