name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

# 同一 PR 新推送时取消旧 run
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.6'
  # 过渡期兼容：部分 action（flutter-action v2.x）尚未完全适配 Node 24
  # 待 subosito/flutter-action 发布 Node 24 原生支持后移除
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter_app/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('flutter_app/pubspec.yaml', 'flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Show Flutter version
        run: flutter --version

      - name: Download dependencies
        run: flutter pub get

      - name: Run analyze
        run: flutter analyze --no-fatal-infos --fatal-warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter_app/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('flutter_app/pubspec.yaml', 'flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Download dependencies
        run: flutter pub get

      - name: Run tests
        # `--exclude-tags golden` 排除带 `@Tags(['golden'])` 的测试文件。
        # Golden 跨平台字体渲染差异（CI 0.09% 像素）会导致 flake，
        # 由独立 golden job 处理（当前 if: false 暂停，见下方）。
        # 详见 docs/TEST_SKIP_REGISTRY.md GOLDEN-CI-001。
        run: flutter test --exclude-tags golden --reporter expanded

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: flutter_app/coverage/

  # Golden UI 测试 job — 暂停状态
  #
  # 跨平台字体渲染差异导致 Windows 本地基线与 Linux CI 渲染不匹配
  # （实测 0.09% / 4007px diff），非真实 UI 回归。
  #
  # 当前策略：
  # - 主 test job 用 `--exclude-tags golden` 排除
  # - 本 job 暂停（if: false），保留轨迹供未来解封
  # - 本地 `flutter test` 默认全跑，开发期间仍有视觉回归保护
  #
  # 解封条件（见 docs/TEST_SKIP_REGISTRY.md GOLDEN-CI-001）：
  #   □ 固定字体安装（Ahem / Roboto）
  #   □ 固定 locale / textScaleFactor / viewport
  #   □ Linux baseline 重新生成
  #   □ 连续 10 次 CI 运行 0 随机 diff
  # 满足后：将 if: false 改为 if: true
  golden:
    name: Golden (paused)
    runs-on: ubuntu-latest
    needs: analyze
    if: false  # pending cross-platform font solution (Phase 3)
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter_app/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('flutter_app/pubspec.yaml', 'flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Download dependencies
        run: flutter pub get

      - name: Run golden tests
        run: flutter test --tags golden --reporter expanded

      - name: Upload golden failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: flutter_app/test/golden/failures/

  build-android:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter_app/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('flutter_app/pubspec.yaml', 'flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ env.FLUTTER_VERSION }}-${{ hashFiles('flutter_app/android/**/*.gradle*', 'flutter_app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ env.FLUTTER_VERSION }}-
            ${{ runner.os }}-gradle-

      - name: Download dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug --no-pub

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: flutter_app/build/app/outputs/flutter-apk/

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter_app/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('flutter_app/pubspec.yaml', 'flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Download dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --no-pub

      - name: Upload Web bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: flutter_app/build/web/
