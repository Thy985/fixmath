name: Flutter CI

on:
  push:
    branches: [master, develop]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    branches: [master, develop]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-ci.yml'

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  flutter-version: '3.44.0'
  pub-cache-dir: ~/.pub-cache

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.pub-cache-dir }}
            flutter_app/.dart_tool
            flutter_app/.flutter-plugins
            flutter_app/.flutter-plugins-dependencies
          key: ${{ runner.os }}-flutter-deps-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-deps-

      - name: Install dependencies
        run: cd flutter_app && flutter pub get

      - name: Flutter Analyze
        run: cd flutter_app && flutter analyze --no-fatal-infos --no-fatal-warnings

  test:
    name: Flutter Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.pub-cache-dir }}
            flutter_app/.dart_tool
            flutter_app/.flutter-plugins
            flutter_app/.flutter-plugins-dependencies
          key: ${{ runner.os }}-flutter-deps-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-deps-

      - name: Install dependencies
        run: cd flutter_app && flutter pub get

      - name: Run unit tests
        run: cd flutter_app && flutter test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: flutter_app/coverage/
          retention-days: 7

      - name: Coverage Report
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: flutter_app/coverage/lcov.info
          flags: flutter
          name: codecov-flutter
          fail_ci_if_error: false

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.pub-cache-dir }}
            flutter_app/.dart_tool
            flutter_app/.flutter-plugins
            flutter_app/.flutter-plugins-dependencies
          key: ${{ runner.os }}-flutter-deps-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-deps-

      - name: Install dependencies
        run: cd flutter_app && flutter pub get

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: cd flutter_app && flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-debug-apk-${{ github.run_number }}
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'
          xcode-version: '15.0'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.pub-cache-dir }}
            flutter_app/.dart_tool
            flutter_app/.flutter-plugins
            flutter_app/.flutter-plugins-dependencies
          key: ${{ runner.os }}-flutter-deps-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-deps-

      - name: Install dependencies
        run: cd flutter_app && flutter pub get

      - name: Build iOS for simulator
        run: cd flutter_app && flutter build ios --simulator --no-codesign

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-build-${{ github.run_number }}
          path: flutter_app/build/ios/iphonesimulator/
          retention-days: 7
