name: Flutter CI

on:
  push:
    branches: [main, master, 'release/**']
  pull_request:
    branches: [main, master]

jobs:
  flutter-test:
    name: Flutter Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true
          cache-key: 'flutter-${{ runner.os }}-${{ hashFiles("**/pubspec.lock") }}'

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Run Flutter analyze
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter tests
        working-directory: flutter_app
        run: flutter test --reporter compact

  flutter-build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: flutter-test
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build debug APK
        working-directory: flutter_app
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-debug-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  flutter-build-ios:
    name: Build iOS (simulator)
    runs-on: macos-latest
    needs: flutter-test
    if: false # Disable iOS build as it requires signing certificate
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build iOS simulator
        working-directory: flutter_app
        run: flutter build ios --simulator --no-codesign
