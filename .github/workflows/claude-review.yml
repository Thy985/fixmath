# PR 自动代码审查 — 四级审查体系
# Level 0: 快速检查（小改动）  → 几分钟
# Level 1: 普通代码 Review     → 常规功能 PR
# Level 2: 设计 Review         → 重要 PR
# Level 3: 架构 Review         → 重大变化
name: Claude 自动审查

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  auto-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 分析 PR 规模
        id: analyze
        shell: bash
        run: |
          # 统计变更行数和文件数
          DIFF_STATS=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD)
          ADDED=$(echo "$DIFF_STATS" | grep -oP '\d+(?= insertion)' || echo 0)
          DELETED=$(echo "$DIFF_STATS" | grep -oP '\d+(?= deletion)' || echo 0)
          FILES=$(echo "$DIFF_STATS" | grep -oP '\d+(?= file)' || echo 0)
          TOTAL=$((ADDED + DELETED))

          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "deleted=$DELETED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

          # 检测变更类型
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          # 是否涉及核心/架构文件
          if echo "$CHANGED_FILES" | grep -qE '(schema|migration|architecture|infra|docker|k8s|deploy|\.github/workflows)'; then
            echo "has_infra=true" >> $GITHUB_OUTPUT
          else
            echo "has_infra=false" >> $GITHUB_OUTPUT
          fi

          # 是否涉及新模块/新目录
          NEW_DIRS=$(git diff --diff-filter=A --name-only origin/${{ github.base_ref }}...HEAD | xargs -I{} dirname {} | sort -u | wc -l)
          echo "new_dirs=$NEW_DIRS" >> $GITHUB_OUTPUT

          # 是否涉及测试文件
          if echo "$CHANGED_FILES" | grep -qE '(test|spec|__tests__)'; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

          # 确定审查级别
          if [ "$TOTAL" -le 30 ] && [ "$FILES" -le 3 ]; then
            echo "level=0" >> $GITHUB_OUTPUT
            echo "level_name=Level 0 快速检查" >> $GITHUB_OUTPUT
          elif [ "$TOTAL" -le 300 ] && [ "$FILES" -le 15 ]; then
            echo "level=1" >> $GITHUB_OUTPUT
            echo "level_name=Level 1 普通代码 Review" >> $GITHUB_OUTPUT
          elif [ "$TOTAL" -le 1000 ] && [ "$FILES" -le 30 ]; then
            echo "level=2" >> $GITHUB_OUTPUT
            echo "level_name=Level 2 设计 Review" >> $GITHUB_OUTPUT
          else
            echo "level=3" >> $GITHUB_OUTPUT
            echo "level_name=Level 3 架构 Review" >> $GITHUB_OUTPUT
          fi

      - name: 打印审查级别
        shell: bash
        run: |
          echo "## PR 审查分析" >> $GITHUB_STEP_SUMMARY
          echo "| 指标 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 变更文件 | ${{ steps.analyze.outputs.files }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 新增行 | ${{ steps.analyze.outputs.added }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 删除行 | ${{ steps.analyze.outputs.deleted }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 总变更 | ${{ steps.analyze.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 新目录 | ${{ steps.analyze.outputs.new_dirs }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 涉及基础设施 | ${{ steps.analyze.outputs.has_infra }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **审查级别** | **${{ steps.analyze.outputs.level_name }}** |" >> $GITHUB_STEP_SUMMARY

      - uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: "https://api.deepseek.com/anthropic"
          ANTHROPIC_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            PR TITLE: ${{ github.event.pull_request.title }}

            ## PR 变更分析
            - 变更文件数: ${{ steps.analyze.outputs.files }}
            - 新增行: ${{ steps.analyze.outputs.added }}
            - 删除行: ${{ steps.analyze.outputs.deleted }}
            - 总变更行: ${{ steps.analyze.outputs.total }}
            - 新增目录: ${{ steps.analyze.outputs.new_dirs }}
            - 涉及基础设施: ${{ steps.analyze.outputs.has_infra }}
            - 涉及测试文件: ${{ steps.analyze.outputs.has_tests }}

            ## 审查级别: ${{ steps.analyze.outputs.level_name }}

            ---

            ### Level 0 快速检查（≤30行，≤3文件）
            如果是 Level 0，只需快速确认：
            - [ ] 是否解决问题？
            - [ ] 是否引入明显 Bug？
            - [ ] 测试是否通过？
            - [ ] 是否符合代码规范？
            简短回复即可，不超过 10 行。

            ### Level 1 普通代码 Review（≤300行，≤15文件）
            如果是 Level 1，按以下维度审查：

            **代码层**
            - [ ] 代码是否清晰？
            - [ ] 是否重复？
            - [ ] 是否容易维护？

            **测试层**
            - [ ] 核心路径是否覆盖？
            - [ ] 异常情况是否考虑？

            **接口层**
            - [ ] 是否破坏已有接口？
            - [ ] 数据结构是否合理？

            ### Level 2 设计 Review（≤1000行，≤30文件）
            如果是 Level 2，除 Level 1 的所有检查项外，增加：

            **设计层**
            - [ ] 模块边界是否合理？
            - [ ] 数据所有权是否明确？
            - [ ] 是否存在未来扩展问题？
            - [ ] 是否需要 ADR（架构决策记录）？

            **变更影响**
            - [ ] 对现有模块的影响范围？
            - [ ] 是否需要数据迁移？
            - [ ] 是否需要分阶段发布？

            ### Level 3 架构 Review（>1000行 或 >30文件）
            如果是 Level 3，除 Level 1 + Level 2 的所有检查项外，增加：

            **架构层**
            - [ ] 架构合理性
            - [ ] 可扩展性
            - [ ] 容灾能力
            - [ ] 性能影响
            - [ ] 安全风险
            - [ ] 运维成本

            **建议输出**
            - 是否需要设计文档？
            - 是否需要架构评审会议？
            - 是否建议分阶段实施？
            - 风险清单和缓解措施

            ---

            ## 输出格式要求

            用中文回复。

            **Level 0**：简短结论 + 通过/需修改，不超过 10 行。
            **Level 1**：按维度逐项检查，对具体代码问题用 inline comment。
            **Level 2**：先输出设计评审意见，再输出代码检查。用 PR comment 输出整体意见。
            **Level 3**：输出完整架构评审报告，包含风险矩阵和改进建议。

            无论哪个级别，最后都要给出结论：
            - ✅ 可以合并
            - ⚠️ 建议修改后合并（列出修改项）
            - ❌ 需要重大修改（列出问题和建议方案）

          claude_args: |
            --model deepseek-v4-flash
            --max-turns 20
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
