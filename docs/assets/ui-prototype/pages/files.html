/**
 * FormulaFix Redesign — Design Tokens
 * 学术写作工具，沉稳、专业、沉浸式
 */

:root, .light {
  /* Brand */
  --ff-primary: #1E3A5F;
  --ff-primary-foreground: #FFFFFF;
  --ff-primary-hover: #16304F;
  --ff-accent: #E76F51;
  --ff-accent-foreground: #FFFFFF;

  /* Semantic */
  --ff-success: #2D6A4F;
  --ff-warning: #E9C46A;
  --ff-error: #C1121F;

  /* Surface — 纸张质感 */
  --ff-background: #FAFAF7;
  --ff-foreground: #1A1D23;
  --ff-card: #FFFFFF;
  --ff-card-foreground: #1A1D23;
  --ff-popover: #FFFFFF;
  --ff-popover-foreground: #1A1D23;
  --ff-muted: #F0EFEA;
  --ff-muted-foreground: #6B7280;
  --ff-border: #E5E4DF;
  --ff-input: #E5E4DF;
  --ff-ring: #1E3A5F;

  /* Editor specific */
  --ff-editor-bg: #FDFDFB;
  --ff-editor-line: #EFEDE6;
  --ff-toolbar-bg: rgba(255,255,255,0.92);
  --ff-formula-bg: linear-gradient(135deg, #EBF0F5 0%, #E8EEF2 100%);

  /* Radius */
  --ff-radius-sm: 6px;
  --ff-radius-md: 10px;
  --ff-radius-lg: 16px;
  --ff-radius-xl: 24px;

  /* Shadows */
  --ff-shadow-sm: 0 1px 2px rgba(26,29,35,0.04);
  --ff-shadow-md: 0 4px 12px rgba(26,29,35,0.06);
  --ff-shadow-lg: 0 12px 40px rgba(26,29,35,0.10);
  --ff-shadow-xl: 0 24px 60px rgba(26,29,35,0.14);

  /* Typography */
  --ff-font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --ff-font-serif: "Iowan Old Style", "Palatino Linotype", "Source Han Serif SC", "Songti SC", Georgia, serif;
  --ff-font-mono: "SF Mono", "JetBrains Mono", "Fira Code", Consolas, monospace;
}

.dark {
  /* Brand — 深色模式下调和亮度 */
  --ff-primary: #5B8DB8;
  --ff-primary-foreground: #0F1419;
  --ff-primary-hover: #7AA5CA;
  --ff-accent: #F4A261;
  --ff-accent-foreground: #0F1419;

  /* Semantic */
  --ff-success: #52B788;
  --ff-warning: #E9C46A;
  --ff-error: #E76F51;

  /* Surface — 深墨 */
  --ff-background: #0F1419;
  --ff-foreground: #E8EAED;
  --ff-card: #1A1D23;
  --ff-card-foreground: #E8EAED;
  --ff-popover: #1A1D23;
  --ff-popover-foreground: #E8EAED;
  --ff-muted: #242830;
  --ff-muted-foreground: #9AA0A6;
  --ff-border: #2A2F38;
  --ff-input: #2A2F38;
  --ff-ring: #5B8DB8;

  /* Editor specific */
  --ff-editor-bg: #13171D;
  --ff-editor-line: #22272F;
  --ff-toolbar-bg: rgba(26,29,35,0.92);
  --ff-formula-bg: linear-gradient(135deg, #1E2A36 0%, #1C2530 100%);

  /* Shadows — 更深但透明 */
  --ff-shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --ff-shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --ff-shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
  --ff-shadow-xl: 0 24px 60px rgba(0,0,0,0.6);
}

/* ---------- Semantic alias mapping for fill-html-head ---------- */
:root {
  --background: var(--ff-background);
  --foreground: var(--ff-foreground);
  --card: var(--ff-card);
  --card-foreground: var(--ff-card-foreground);
  --popover: var(--ff-popover);
  --popover-foreground: var(--ff-popover-foreground);
  --primary: var(--ff-primary);
  --primary-foreground: var(--ff-primary-foreground);
  --muted: var(--ff-muted);
  --muted-foreground: var(--ff-muted-foreground);
  --border: var(--ff-border);
  --input: var(--ff-input);
  --ring: var(--ff-ring);
  --radius-sm: var(--ff-radius-sm);
  --radius-md: var(--ff-radius-md);
  --radius-lg: var(--ff-radius-lg);
  --success: var(--ff-success);
  --warning: var(--ff-warning);
  --error: var(--ff-error);
  --accent: var(--ff-accent);
}

<body class="min-h-screen font-sans antialiased">
    <main class="max-w-md mx-auto bg-[var(--ff-background)] pb-28">

      <!-- 1. Top bar -->
      <header class="sticky top-0 z-30 bg-[var(--ff-background)]/90 backdrop-blur border-b border-[var(--ff-border)] px-5 h-13 flex items-center justify-between">
        <h2 class="text-[20px] font-semibold" style="font-family:var(--ff-font-serif)">文件</h2>
        <div class="flex items-center gap-1">
          <button class="inline-flex items-center justify-center w-9 h-9 rounded-lg text-[var(--ff-muted-foreground)] hover:bg-[var(--ff-muted)] transition-colors" aria-label="搜索">
            <i data-lucide="search" class="w-[18px] h-[18px]"></i>
          </button>
          <button class="inline-flex items-center justify-center w-9 h-9 rounded-lg text-[var(--ff-muted-foreground)] hover:bg-[var(--ff-muted)] transition-colors" aria-label="更多">
            <i data-lucide="more-horizontal" class="w-[18px] h-[18px]"></i>
          </button>
        </div>
      </header>

      <!-- 2. Storage summary bar -->
      <div class="mt-4 mx-5 rounded-xl bg-[var(--ff-primary)]/5 border border-[var(--ff-primary)]/10 p-3 flex items-center gap-3">
        <div class="text-[var(--ff-primary)] flex items-center justify-center shrink-0">
          <i data-lucide="hard-drive" class="w-[22px] h-[22px]"></i>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-[13px] font-medium text-[var(--ff-foreground)]">本地存储</div>
          <div class="text-[11px] text-[var(--ff-muted-foreground)] truncate">已用 128 MB · 47 个文件</div>
        </div>
        <div class="shrink-0 w-10 h-10 rounded-full border-[3px] border-[var(--ff-primary)]/20 flex items-center justify-center">
          <span class="text-[11px] font-medium text-[var(--ff-primary)]">13%</span>
        </div>
      </div>

      <!-- 3. Section: 快捷访问 -->
      <section class="mt-6 px-5">
        <h3 class="text-[14px] font-semibold" style="font-family:var(--ff-font-serif)">快捷访问</h3>
        <div class="grid grid-cols-4 gap-2 mt-2">
          <button class="rounded-xl bg-[var(--ff-card)] border border-[var(--ff-border)] p-3 flex flex-col items-center justify-center gap-1">
            <i data-lucide="star" class="w-[18px] h-[18px] text-[var(--ff-primary)]"></i>
            <span class="text-[10px] text-[var(--ff-foreground)]">收藏</span>

          <button class="rounded-xl bg-[var(--ff-card)] border border-[var(--ff-border)] p-3 flex flex-col items-center justify-center gap-1">
            <i data-lucide="clock" class="w-[18px] h-[18px] text-[var(--ff-muted-foreground)]"></i>
            <span class="text-[10px] text-[var(--ff-foreground)]">最近</span>
          </button>
          <button class="rounded-xl bg-[var(--ff-card)] border border-[var(--ff-border)] p-3 flex flex-col items-center justify-center gap-1">
            <i data-lucide="download" class="w-[18px] h-[18px] text-[var(--ff-muted-foreground)]"></i>
            <span class="text-[10px] text-[var(--ff-foreground)]">下载</span>
          </button>
          <button class="rounded-xl bg-[var(--ff-card)] border border-[var(--ff-border)] p-3 flex flex-col items-center justify-center gap-1">
            <i data-lucide="trash-2" class="w-[18px] h-[18px] text-[var(--ff-muted-foreground)]"></i>
            <span class="text-[10px] text-[var(--ff-foreground)]">回收站</span>
          </button>
        </div>
      </section>

      <!-- 4. Section: 文件夹 -->
      <section class="mt-6 px-5">
        <div class="flex items-center justify-between">
          <h3 class="text-[14px] font-semibold" style="font-family:var(--ff-font-serif)">文件夹</h3>
          <button class="inline-flex items-center gap-1 text-[12px] text-[var(--ff-primary)]">

            <div class="text-amber-500 flex items-center justify-center shrink-0">
