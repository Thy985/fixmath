/**
 * FormulaFix Redesign — Design Tokens
 * 学术写作工具，沉稳、专业、沉浸式
 */

:root, .light {
  /* Brand */
  --ff-primary: #1E3A5F;
  --ff-primary-foreground: #FFFFFF;
  --ff-primary-hover: #16304F;
  --ff-accent: #E76F51;

  /* Semantic */
  --ff-success: #2D6A4F;
  --ff-warning: #E9C46A;
  --ff-error: #C1121F;

  /* Surface — 纸张质感 */
  --ff-background: #FAFAF7;
  --ff-foreground: #1A1D23;
  --ff-card: #FFFFFF;
  --ff-card-foreground: #1A1D23;
  --ff-popover: #FFFFFF;
  --ff-popover-foreground: #1A1D23;
  --ff-muted: #F0EFEA;
  --ff-muted-foreground: #6B7280;
  --ff-border: #E5E4DF;
  --ff-input: #E5E4DF;
  --ff-ring: #1E3A5F;

  /* Editor specific */
  --ff-editor-bg: #FDFDFB;
  --ff-editor-line: #EFEDE6;
  --ff-toolbar-bg: rgba(255,255,255,0.92);
  --ff-formula-bg: linear-gradient(135deg, #EBF0F5 0%, #E8EEF2 100%);

  /* Radius */
  --ff-radius-sm: 6px;
  --ff-radius-md: 10px;
  --ff-radius-lg: 16px;
  --ff-radius-xl: 24px;

  /* Shadows */
  --ff-shadow-sm: 0 1px 2px rgba(26,29,35,0.04);
  --ff-shadow-md: 0 4px 12px rgba(26,29,35,0.06);
  --ff-shadow-lg: 0 12px 40px rgba(26,29,35,0.10);
  --ff-shadow-xl: 0 24px 60px rgba(26,29,35,0.14);

  /* Typography */
  --ff-font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --ff-font-serif: "Iowan Old Style", "Palatino Linotype", "Source Han Serif SC", "Songti SC", Georgia, serif;
  --ff-font-mono: "SF Mono", "JetBrains Mono", "Fira Code", Consolas, monospace;
}

.dark {
  /* Brand — 深色模式下调和亮度 */
  --ff-primary: #5B8DB8;
  --ff-primary-foreground: #0F1419;
  --ff-primary-hover: #7AA5CA;
  --ff-accent: #F4A261;
  --ff-accent-foreground: #0F1419;

  /* Semantic */
  --ff-success: #52B788;
  --ff-warning: #E9C46A;
  --ff-error: #E76F51;

  /* Surface — 深墨 */
  --ff-background: #0F1419;
  --ff-foreground: #E8EAED;
  --ff-card: #1A1D23;
  --ff-card-foreground: #E8EAED;
  --ff-popover: #1A1D23;
  --ff-popover-foreground: #E8EAED;
  --ff-muted: #242830;
  --ff-muted-foreground: #9AA0A6;
  --ff-border: #2A2F38;
  --ff-input: #2A2F38;
  --ff-ring: #5B8DB8;

  /* Editor specific */
  --ff-editor-bg: #13171D;
  --ff-editor-line: #22272F;
  --ff-toolbar-bg: rgba(26,29,35,0.92);
  --ff-formula-bg: linear-gradient(135deg, #1E2A36 0%, #1C2530 100%);

  /* Shadows — 更深但透明 */
  --ff-shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --ff-shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --ff-shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
  --ff-shadow-xl: 0 24px 60px rgba(0,0,0,0.6);
}

/* ---------- Semantic alias mapping for fill-html-head ---------- */
:root {
  --background: var(--ff-background);
  --foreground: var(--ff-foreground);
  --card: var(--ff-card);
  --card-foreground: var(--ff-card-foreground);
  --popover: var(--ff-popover);
  --popover-foreground: var(--ff-popover-foreground);

  --primary-foreground: var(--ff-primary-foreground);
  --muted: var(--ff-muted);
  --muted-foreground: var(--ff-muted-foreground);
  --border: var(--ff-border);
  --input: var(--ff-input);
  --ring: var(--ff-ring);
  --radius-sm: var(--ff-radius-sm);
  --radius-md: var(--ff-radius-md);
  --radius-lg: var(--ff-radius-lg);
  --success: var(--ff-success);
  --warning: var(--ff-warning);
  --error: var(--ff-error);
  --accent: var(--ff-accent);
}

          <div class="w-10 h-6 rounded-full relative cursor-pointer" style="background:var(--ff-primary);">

          <i data-lucide="chevron-right" class="w-[14px] h-[14px]" style="color:var(--ff-muted-foreground);"></i>

        <div class="flex items-center justify-between px-4 py-3.5" style="border-bottom:1px solid rgba(229,228,223,0.6);">

          <div class="flex items-center gap-2.5">
            <i data-lucide="message-circle" class="w-4 h-4" style="color:var(--ff-muted-foreground);"></i>
            <span class="text-[14px]" style="color:var(--ff-foreground);">反馈建议</span>
          </div>
          <i data-lucide="chevron-right" class="w-[14px] h-[14px]" style="color:var(--ff-muted-foreground);"></i>
        </div>
      </div>

      <!-- Group 5: 危险区域 -->
      <div class="mx-5 mt-4 rounded-xl overflow-hidden" style="background:var(--ff-card); border:1px solid rgba(193,18,31,0.2);">

          <div class="flex items-center gap-2.5">
            <i data-lucide="trash-2" class="w-4 h-4" style="color:var(--ff-error);"></i>
            <span class="text-[14px]" style="color:rgba(193,18,31,0.8);">清除缓存</span>
          </div>
          <i data-lucide="chevron-right" class="w-[14px] h-[14px]" style="color:var(--ff-muted-foreground);"></i>
        </div>
        <div class="flex items-center justify-between px-4 py-3.5">
          <div class="flex items-center gap-2.5">
            <i data-lucide="log-out" class="w-4 h-4" style="color:var(--ff-error);"></i>
            <span class="text-[14px]" style="color:rgba(193,18,31,0.8);">退出登录</span>
          </div>
          <i data-lucide="chevron-right" class="w-[14px] h-[14px]" style="color:var(--ff-muted-foreground);"></i>

      <!-- 5. Version footer -->
      <div class="mt-6 mb-4 text-center">
        <div class="text-[11px]" style="color:var(--ff-muted-foreground);">FormulaFix v0.1.0</div>
        <div class="text-[10px] mt-0.5" style="color:rgba(107,114,128,0.6); font-family:var(--ff-font-serif); font-style:italic;">Made with &#8747; for scholars</div>
      </div>

      <!-- Bottom spacer for tab bar -->
      <div class="h-16"></div>

      <!-- 6. Bottom tab bar -->

        <div class="mx-auto grid h-16 grid-cols-4">
          <button class="flex flex-col items-center justify-center gap-0.5 text-[var(--ff-muted-foreground)]" data-nav-key="home">
            <i data-lucide="home" class="h-[22px] w-[22px]"></i>
            <span class="whitespace-nowrap text-[11px]">首页</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 text-[var(--ff-muted-foreground)]" data-nav-key="files">
            <i data-lucide="folder-open" class="h-[22px] w-[22px]"></i>

          <button class="flex flex-col items-center justify-center gap-0.5 text-[var(--ff-muted-foreground)]" data-nav-key="reader">

            <span class="whitespace-nowrap text-[11px]">阅读</span>

          <button class="flex flex-col items-center justify-center gap-0.5 text-[var(--ff-primary)]" data-nav-key="me" data-active="true">
            <i data-lucide="user" class="h-[22px] w-[22px]"></i>
            <span class="whitespace-nowrap text-[11px] font-medium">我的</span>
          </button>
        </div>
        <div class="mx-auto my-1 h-1 w-32 rounded-full bg-black/20"></div>
      </nav>

    </main>
