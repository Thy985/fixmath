<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormulaFix · 文档库</title>
    <style id="theme-vars">
/**
 * FormulaFix Redesign — Design Tokens
 * 学术写作工具，沉稳、专业、沉浸式
 */

:root, .light {
  /* Brand */
  --ff-primary: #1E3A5F;
  --ff-primary-foreground: #FFFFFF;
  --ff-primary-hover: #16304F;
  --ff-accent: #E76F51;
  --ff-accent-foreground: #FFFFFF;

  /* Semantic */
  --ff-success: #2D6A4F;
  --ff-warning: #E9C46A;
  --ff-error: #C1121F;

  /* Surface — 纸张质感 */
  --ff-background: #FAFAF7;
  --ff-foreground: #1A1D23;
  --ff-card: #FFFFFF;
  --ff-card-foreground: #1A1D23;
  --ff-popover: #FFFFFF;
  --ff-popover-foreground: #1A1D23;
  --ff-muted: #F0EFEA;
  --ff-muted-foreground: #6B7280;
  --ff-border: #E5E4DF;
  --ff-input: #E5E4DF;
  --ff-ring: #1E3A5F;

  /* Editor specific */
  --ff-editor-bg: #FDFDFB;
  --ff-editor-line: #EFEDE6;
  --ff-toolbar-bg: rgba(255,255,255,0.92);
  --ff-formula-bg: linear-gradient(135deg, #EBF0F5 0%, #E8EEF2 100%);

  /* Radius */
  --ff-radius-sm: 6px;
  --ff-radius-md: 10px;
  --ff-radius-lg: 16px;
  --ff-radius-xl: 24px;

  /* Shadows */
  --ff-shadow-sm: 0 1px 2px rgba(26,29,35,0.04);
  --ff-shadow-md: 0 4px 12px rgba(26,29,35,0.06);
  --ff-shadow-lg: 0 12px 40px rgba(26,29,35,0.10);
  --ff-shadow-xl: 0 24px 60px rgba(26,29,35,0.14);

  /* Typography */
  --ff-font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --ff-font-serif: "Iowan Old Style", "Palatino Linotype", "Source Han Serif SC", "Songti SC", Georgia, serif;
  --ff-font-mono: "SF Mono", "JetBrains Mono", "Fira Code", Consolas, monospace;
}

.dark {
  /* Brand — 深色模式下调和亮度 */
  --ff-primary: #5B8DB8;
  --ff-primary-foreground: #0F1419;
  --ff-primary-hover: #7AA5CA;
  --ff-accent: #F4A261;
  --ff-accent-foreground: #0F1419;

  /* Semantic */
  --ff-success: #52B788;
  --ff-warning: #E9C46A;
  --ff-error: #E76F51;

  /* Surface — 深墨 */
  --ff-background: #0F1419;
  --ff-foreground: #E8EAED;
  --ff-card: #1A1D23;
  --ff-card-foreground: #E8EAED;
  --ff-popover: #1A1D23;
  --ff-popover-foreground: #E8EAED;
  --ff-muted: #242830;
  --ff-muted-foreground: #9AA0A6;
  --ff-border: #2A2F38;
  --ff-input: #2A2F38;
  --ff-ring: #5B8DB8;

  /* Editor specific */
  --ff-editor-bg: #13171D;
  --ff-editor-line: #22272F;
  --ff-toolbar-bg: rgba(26,29,35,0.92);
  --ff-formula-bg: linear-gradient(135deg, #1E2A36 0%, #1C2530 100%);

  /* Shadows — 更深但透明 */
  --ff-shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --ff-shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --ff-shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
  --ff-shadow-xl: 0 24px 60px rgba(0,0,0,0.6);
}

/* ---------- Semantic alias mapping for fill-html-head ---------- */
:root {
  --background: var(--ff-background);
  --foreground: var(--ff-foreground);
  --card: var(--ff-card);
  --card-foreground: var(--ff-card-foreground);
  --popover: var(--ff-popover);
  --popover-foreground: var(--ff-popover-foreground);
  --primary: var(--ff-primary);
  --primary-foreground: var(--ff-primary-foreground);
  --muted: var(--ff-muted);
  --muted-foreground: var(--ff-muted-foreground);
  --border: var(--ff-border);
  --input: var(--ff-input);
  --ring: var(--ff-ring);
  --radius-sm: var(--ff-radius-sm);
  --radius-md: var(--ff-radius-md);
  --radius-lg: var(--ff-radius-lg);
  --success: var(--ff-success);
  --warning: var(--ff-warning);
  --error: var(--ff-error);
  --accent: var(--ff-accent);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--ff-background);
    --color-foreground: var(--ff-foreground);
    --color-card: var(--ff-card);
    --color-card-foreground: var(--ff-card-foreground);
    --color-popover: var(--ff-popover);
    --color-popover-foreground: var(--ff-popover-foreground);
    --color-primary: var(--ff-primary);
    --color-primary-foreground: var(--ff-primary-foreground);
    --color-muted: var(--ff-muted);
    --color-muted-foreground: var(--ff-muted-foreground);
    --color-accent: var(--ff-accent);
    --color-border: var(--ff-border);
    --color-input: var(--ff-input);
    --color-ring: var(--ff-ring);
    --radius-sm: var(--ff-radius-sm);
    --radius-md: var(--ff-radius-md);
    --radius-lg: var(--ff-radius-lg);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style id="semantic-token-fallback">
      .bg-background { background-color: var(--ff-background); }
      .text-background { color: var(--ff-background); }
      .border-background { border-color: var(--ff-background); }
      .ring-background { --tw-ring-color: var(--ff-background); }
      .bg-foreground { background-color: var(--ff-foreground); }
      .text-foreground { color: var(--ff-foreground); }
      .border-foreground { border-color: var(--ff-foreground); }
      .ring-foreground { --tw-ring-color: var(--ff-foreground); }
      .bg-card { background-color: var(--ff-card); }
      .text-card { color: var(--ff-card); }
      .border-card { border-color: var(--ff-card); }
      .ring-card { --tw-ring-color: var(--ff-card); }
      .bg-card-foreground { background-color: var(--ff-card-foreground); }
      .text-card-foreground { color: var(--ff-card-foreground); }
      .border-card-foreground { border-color: var(--ff-card-foreground); }
      .ring-card-foreground { --tw-ring-color: var(--ff-card-foreground); }
      .bg-popover { background-color: var(--ff-popover); }
      .text-popover { color: var(--ff-popover); }
      .border-popover { border-color: var(--ff-popover); }
      .ring-popover { --tw-ring-color: var(--ff-popover); }
      .bg-popover-foreground { background-color: var(--ff-popover-foreground); }
      .text-popover-foreground { color: var(--ff-popover-foreground); }
      .border-popover-foreground { border-color: var(--ff-popover-foreground); }
      .ring-popover-foreground { --tw-ring-color: var(--ff-popover-foreground); }
      .bg-primary { background-color: var(--ff-primary); }
      .text-primary { color: var(--ff-primary); }
      .border-primary { border-color: var(--ff-primary); }
      .ring-primary { --tw-ring-color: var(--ff-primary); }
      .bg-primary-foreground { background-color: var(--ff-primary-foreground); }
      .text-primary-foreground { color: var(--ff-primary-foreground); }
      .border-primary-foreground { border-color: var(--ff-primary-foreground); }
      .ring-primary-foreground { --tw-ring-color: var(--ff-primary-foreground); }
      .bg-muted { background-color: var(--ff-muted); }
      .text-muted { color: var(--ff-muted); }
      .border-muted { border-color: var(--ff-muted); }
      .ring-muted { --tw-ring-color: var(--ff-muted); }
      .bg-muted-foreground { background-color: var(--ff-muted-foreground); }
      .text-muted-foreground { color: var(--ff-muted-foreground); }
      .border-muted-foreground { border-color: var(--ff-muted-foreground); }
      .ring-muted-foreground { --tw-ring-color: var(--ff-muted-foreground); }
      .bg-accent { background-color: var(--ff-accent); }
      .text-accent { color: var(--ff-accent); }
      .border-accent { border-color: var(--ff-accent); }
      .ring-accent { --tw-ring-color: var(--ff-accent); }
      .bg-border { background-color: var(--ff-border); }
      .text-border { color: var(--ff-border); }
      .border-border { border-color: var(--ff-border); }
      .ring-border { --tw-ring-color: var(--ff-border); }
      .bg-input { background-color: var(--ff-input); }
      .text-input { color: var(--ff-input); }
      .border-input { border-color: var(--ff-input); }
      .ring-input { --tw-ring-color: var(--ff-input); }
      .bg-ring { background-color: var(--ff-ring); }
      .text-ring { color: var(--ff-ring); }
      .border-ring { border-color: var(--ff-ring); }
      .ring-ring { --tw-ring-color: var(--ff-ring); }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;

        mask-position: center;

      }

</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen bg-[var(--ff-background)] pb-28">
      <div class="mx-auto max-w-md px-4">
        <!-- 1. Status bar spacer -->
        <div class="flex h-12 items-center justify-between pt-2 text-[14px] font-semibold text-[var(--ff-foreground)]">
          <span class="tracking-tight">9:41</span>
          <div class="flex items-center gap-1.5">
            <!-- signal -->
            <i data-lucide="signal" class="h-[14px] w-[14px]"></i>
            <!-- wifi -->
            <i data-lucide="wifi" class="h-[14px] w-[14px]"></i>
            <!-- battery -->
            <div class="flex items-center">
              <div class="relative flex h-[12px] w-[24px] items-center rounded-[3px] border border-[var(--ff-foreground)]/40 px-[1.5px]">
                <div class="h-[7px] w-[17px] rounded-[1.5px] bg-[var(--ff-foreground)]/80"></div>
              </div>
              <div class="ml-[1px] h-[5px] w-[1.5px] rounded-r bg-[var(--ff-foreground)]/40"></div>
            </div>
          </div>
        </div>

        <!-- 2. Minimal header: serif wordmark + low-key icon buttons -->
        <header class="flex items-center justify-between">
          <span class="text-[19px] font-semibold text-[var(--ff-foreground)] tracking-tight" style="font-family: var(--ff-font-serif);">FormulaFix</span>
          <div class="flex items-center gap-1">
            <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-[var(--ff-muted)] transition-colors" aria-label="搜索">
              <i data-lucide="search" class="w-[18px] h-[18px] text-[var(--ff-foreground)]/70"></i>
            </button>
            <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-[var(--ff-muted)] transition-colors" aria-label="新建文档">
              <i data-lucide="plus" class="w-[18px] h-[18px] text-[var(--ff-foreground)]/70"></i>
            </button>
          </div>
        </header>

        <!-- 3. 便携查看器入口: 打开任意 .md 文件 -->
        <button class="mt-3 w-full border border-dashed border-[var(--ff-border)] rounded-lg px-4 py-3 flex items-center gap-2 hover:bg-[var(--ff-muted)] transition-colors text-left">
          <i data-lucide="folder-open" class="w-4 h-4 text-[var(--ff-muted-foreground)] shrink-0"></i>
          <span class="text-[13px] text-[var(--ff-foreground)]/80 flex-1 truncate">打开任意 .md 文件</span>
          <span class="text-[11px] text-[var(--ff-muted-foreground)] shrink-0 whitespace-nowrap">即开即看</span>
        </button>

        <!-- 3b. 来源 chips（降级为极简水平行，低调暗示支持的来源） -->
        <div class="mt-2.5 flex flex-wrap gap-1.5">
          <span class="text-[11px] text-[var(--ff-muted-foreground)] bg-[var(--ff-muted)]/60 rounded-full px-2.5 py-1 whitespace-nowrap">微信</span>
          <span class="text-[11px] text-[var(--ff-muted-foreground)] bg-[var(--ff-muted)]/60 rounded-full px-2.5 py-1 whitespace-nowrap">邮件</span>
          <span class="text-[11px] text-[var(--ff-muted-foreground)] bg-[var(--ff-muted)]/60 rounded-full px-2.5 py-1 whitespace-nowrap">下载</span>
          <span class="text-[11px] text-[var(--ff-muted-foreground)] bg-[var(--ff-muted)]/60 rounded-full px-2.5 py-1 whitespace-nowrap">AirDrop</span>
          <span class="text-[11px] text-[var(--ff-muted-foreground)] bg-[var(--ff-muted)]/60 rounded-full px-2.5 py-1 whitespace-nowrap">文件App</span>
        </div>

        <!-- 4. Section label: 最近打开 -->
        <h2 class="mt-6 text-[13px] font-medium text-[var(--ff-muted-foreground)]" style="font-family: var(--ff-font-serif);">最近打开</h2>

        <!-- 5. 最近打开 — 外部文件极简列表（来源以文字表达，右对齐时间） -->
        <ul class="mt-2">
          <li>
            <button class="w-full py-3.5 flex items-start gap-3 border-b border-[var(--ff-border)]/50 hover:bg-[var(--ff-muted)] transition-colors text-left">
              <div class="flex-1 min-w-0">
                <h3 class="text-[15px] font-semibold text-[var(--ff-foreground)] truncate" style="font-family: var(--ff-font-serif);">贝叶斯统计笔记.md</h3>
                <p class="text-[12px] text-[var(--ff-muted-foreground)] mt-0.5 line-clamp-1">来自微信 · 张教授</p>
              </div>
              <span class="text-[11px] text-[var(--ff-muted-foreground)] shrink-0 whitespace-nowrap tabular-nums pt-0.5">10分钟前</span>
            </button>
          </li>
          <li>
            <button class="w-full py-3.5 flex items-start gap-3 border-b border-[var(--ff-border)]/50 hover:bg-[var(--ff-muted)] transition-colors text-left">
              <div class="flex-1 min-w-0">
                <h3 class="text-[15px] font-semibold text-[var(--ff-foreground)] truncate" style="font-family: var(--ff-font-serif);">狭义相对论复习.md</h3>
                <p class="text-[12px] text-[var(--ff-muted-foreground)] mt-0.5 line-clamp-1">来自邮件 · 导师邮箱</p>
              </div>
              <span class="text-[11px] text-[var(--ff-muted-foreground)] shrink-0 whitespace-nowrap tabular-nums pt-0.5">2小时前</span>
            </button>
          </li>
          <li>
            <button class="w-full py-3.5 flex items-start gap-3 border-b border-[var(--ff-border)]/50 hover:bg-[var(--ff-muted)] transition-colors text-left">
              <div class="flex-1 min-w-0">
                <h3 class="text-[15px] font-semibold text-[var(--ff-foreground)] truncate" style="font-family: var(--ff-font-serif);">README.md</h3>
                <p class="text-[12px] text-[var(--ff-muted-foreground)] mt-0.5 line-clamp-1">来自下载 · GitHub</p>
              </div>
              <span class="text-[11px] text-[var(--ff-muted-foreground)] shrink-0 whitespace-nowrap tabular-nums pt-0.5">昨天</span>
            </button>
          </li>
        </ul>

        <!-- 6. Section label: 我的文档 -->
        <h2 class="mt-6 text-[13px] font-medium text-[var(--ff-muted-foreground)]" style="font-family: var(--ff-font-serif);">我的文档</h2>

        <!-- 7. 我的文档 — 极简列表（字数·标签摘要，右对齐时间） -->
        <ul class="mt-2">
          <li>
            <button class="w-full py-3.5 flex items-start gap-3 border-b border-[var(--ff-border)]/50 hover:bg-[var(--ff-muted)] transition-colors text-left">
              <div class="flex-1 min-w-0">
                <h3 class="text-[15px] font-semibold text-[var(--ff-foreground)] truncate" style="font-family: var(--ff-font-serif);">广义相对论场方程推导</h3>
                <p class="text-[12px] text-[var(--ff-muted-foreground)] mt-0.5 line-clamp-1">2,341字 · 物理</p>
              </div>
              <span class="text-[11px] text-[var(--ff-muted-foreground)] shrink-0 whitespace-nowrap tabular-nums pt-0.5">2小时前</span>
            </button>
          </li>
          <li>
            <button class="w-full py-3.5 flex items-start gap-3 border-b border-[var(--ff-border)]/50 hover:bg-[var(--ff-muted)] transition-colors text-left">
              <div class="flex-1 min-w-0">
                <h3 class="text-[15px] font-semibold text-[var(--ff-foreground)] truncate" style="font-family: var(--ff-font-serif);">线性代数期末复习笔记</h3>
                <p class="text-[12px] text-[var(--ff-muted-foreground)] mt-0.5 line-clamp-1">5,802字 · 数学</p>
              </div>
              <span class="text-[11px] text-[var(--ff-muted-foreground)] shrink-0 whitespace-nowrap tabular-nums pt-0.5">昨天</span>
            </button>
          </li>
          <li>
            <button class="w-full py-3.5 flex items-start gap-3 border-b border-[var(--ff-border)]/50 hover:bg-[var(--ff-muted)] transition-colors text-left">
              <div class="flex-1 min-w-0">
                <div class="flex items-baseline gap-1.5 min-w-0">
                  <h3 class="text-[15px] font-semibold text-[var(--ff-foreground)] truncate" style="font-family: var(--ff-font-serif);">量子力学随笔</h3>
                  <span class="text-[10px] text-[var(--ff-muted-foreground)] shrink-0 whitespace-nowrap">草稿</span>
                </div>
                <p class="text-[12px] text-[var(--ff-muted-foreground)] mt-0.5 line-clamp-1">1,128字 · 物理</p>
              </div>
              <span class="text-[11px] text-[var(--ff-muted-foreground)] shrink-0 whitespace-nowrap tabular-nums pt-0.5">3天前</span>
            </button>
          </li>
        </ul>

        <!-- Bottom spacer for tab bar -->
        <div class="h-6"></div>
      </div>

      <!-- 8. Bottom tab bar -->
      <nav class="fixed bottom-0 left-1/2 z-40 w-full max-w-md -translate-x-1/2 border-t border-[var(--ff-border)] bg-[var(--ff-card)]/95 backdrop-blur">
        <div class="mx-auto grid h-16 grid-cols-4">
          <button class="flex flex-col items-center justify-center gap-0.5 text-[var(--ff-primary)]" data-nav-key="home" data-active="true">
            <i data-lucide="home" class="h-[22px] w-[22px]"></i>
            <span class="whitespace-nowrap text-[11px] font-medium">首页</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 text-[var(--ff-muted-foreground)]" data-nav-key="files">
            <i data-lucide="folder-open" class="h-[22px] w-[22px]"></i>
            <span class="whitespace-nowrap text-[11px]">文件</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 text-[var(--ff-muted-foreground)]" data-nav-key="reader">
            <i data-lucide="book-open" class="h-[22px] w-[22px]"></i>
            <span class="whitespace-nowrap text-[11px]">阅读</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 text-[var(--ff-muted-foreground)]" data-nav-key="me">
            <i data-lucide="user" class="h-[22px] w-[22px]"></i>
            <span class="whitespace-nowrap text-[11px]">我的</span>
          </button>
        </div>
        <!-- iOS home indicator -->
        <div class="mx-auto my-1 h-1 w-32 rounded-full bg-black/20"></div>
      </nav>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
